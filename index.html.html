<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Rusiya Family Tree App</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f6f2;
      --surface:#fbfbf9;
      --text:#28251d;
      --muted:#6f6b63;
      --border:#d8d4cd;
      --edge:#8ea0a0;
      --accent:#01696f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Satoshi',system-ui,sans-serif;
    }
    .wrap{
      display:grid;
      grid-template-rows:auto 1fr;
      height:100%;
    }
    .toolbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      padding:12px 16px;
      border-bottom:1px solid var(--border);
      background:rgba(251,251,249,.96);
    }
    .title{font-size:18px;font-weight:700}
    .meta{font-size:13px;color:var(--muted);max-width:840px}
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    button{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:10px;
      padding:8px 12px;
      font-weight:600;
      cursor:pointer;
    }
    .toggle{
      display:inline-flex;
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--surface);
    }
    .toggle button{
      border:none;
      border-right:1px solid var(--border);
      border-radius:0;
    }
    .toggle button:last-child{border-right:none}
    .toggle button.active{
      background:var(--accent);
      color:#fff;
    }
    .legend{
      padding:8px 16px 14px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }
    .key{display:inline-flex;gap:6px;align-items:center}
    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      border:1px solid rgba(0,0,0,.12);
      display:inline-block;
    }
    .canvas{
      overflow:auto;
      position:relative;
    }
    .stage{
      width:max-content;
      min-width:100%;
      min-height:100%;
      display:grid;
      place-items:start center;
      padding:24px;
    }
    #viewport{transform-origin:top left}
    .edge{
      fill:none;
      stroke:var(--edge);
      stroke-width:1.6;
      opacity:.8;
      transition:opacity .18s ease, stroke-width .18s ease, stroke .18s ease;
    }
    .node{
      cursor:pointer;
      transition:opacity .18s ease, transform .22s ease;
    }
    .node rect{
      stroke:rgba(40,37,29,.12);
      stroke-width:1;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,.06));
      transition:stroke .18s ease, stroke-width .18s ease, filter .18s ease;
    }
    .label{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 2px;
      font-size:12px;
      line-height:1.12;
      font-weight:700;
      color:var(--text);
      overflow:hidden;
      word-break:break-word;
    }
    .uncertain rect{stroke-dasharray:4 3}
    .node.active rect{
      stroke:var(--accent);
      stroke-width:2;
      filter:drop-shadow(0 6px 14px rgba(1,105,111,.18));
    }
    .edge.active{
      stroke:var(--accent);
      stroke-width:2.8;
      opacity:1;
    }
    .faded{opacity:.12 !important}
    .zoom-slider{display:flex;align-items:center;gap:4px}
    .zoom-slider input[type="range"]{width:120px}
    @media (max-width:860px){
      .toolbar{
        flex-direction:column;
        align-items:flex-start;
      }
      .title{font-size:16px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="toolbar">
      <div>
        <div class="title">Rusiya Family Tree</div>
        <div class="meta">
          Top-to-bottom family tree with Hindi/English toggle.
          Select a node to temporarily rearrange the highlighted family cluster into one compact centered view.
        </div>
      </div>
      <div class="controls">
        <div class="toggle">
          <button id="langEn" class="active" type="button">English</button>
          <button id="langHi" type="button">हिंदी</button>
        </div>
        <button id="fitBtn" type="button">Fit to screen</button>
        <button id="zin" type="button">Zoom in</button>
        <button id="zout" type="button">Zoom out</button>
        <div class="zoom-slider">
          <span style="font-size:11px;color:var(--muted);margin-right:4px;">Zoom</span>
          <input id="zoomSlider" type="range" min="20" max="300" value="100" />
        </div>
        <button id="resetZoom" type="button">100%</button>
        <button id="clearFocus" type="button">Clear focus</button>
      </div>
    </div>
    <div class="legend">
      <span class="key"><span class="dot" style="background:#e8f3f3"></span> Male / male pair</span>
      <span class="key"><span class="dot" style="background:#f6e9ef"></span> Female / female pair</span>
      <span class="key"><span class="dot" style="background:#efece4"></span> Mixed couple</span>
      <span class="key">Dashed border = uncertain or faded transcription note</span>
    </div>
  </div>
  <div class="canvas" id="canvas">
    <div class="stage">
      <div id="viewport"></div>
    </div>
  </div>
</div>

    g.setAttribute("transform", `translate(${n.x},${n.y})`);
    g.dataset.gid = gid;
    g.dataset.x = n.x;
    g.dataset.y = n.y;
    g.setAttribute("tabindex", "0");
    g.setAttribute("role", "button");
    const rect = document.createElementNS(svgNS, "rect");
    rect.setAttribute("rx", "12");
    rect.setAttribute("ry", "12");
    rect.setAttribute("width", nodeW);
    rect.setAttribute("height", nodeH);
    rect.setAttribute("fill", n.fill);
    g.appendChild(rect);
    const fo = document.createElementNS(svgNS, "foreignObject");
    fo.setAttribute("x", "8");
    fo.setAttribute("y", "6");
    fo.setAttribute("width", nodeW - 16);
    fo.setAttribute("height", nodeH - 12);
    const div = document.createElement("div");
    div.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
    div.className = "label";
    div.dataset.en = n.label_en;
    div.dataset.hi = n.label_hi;
    div.textContent = n.label_en;
    fo.appendChild(div);
    g.appendChild(fo);
    nodesG.appendChild(g);
  });
  svg.appendChild(edgesG);
  svg.appendChild(nodesG);
  document.getElementById("viewport").appendChild(svg);
})();
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const nodes = [];
const edges = [];
function refreshNodeEdgeLists() {
  nodes.length = 0;
  edges.length = 0;
  nodes.push(...document.querySelectorAll('.node'));
  edges.push(...document.querySelectorAll('.edge'));
}
refreshNodeEdgeLists();
let scale = 1;
let activeGid = null;
const zoomSlider = document.getElementById('zoomSlider');
function applyZoom(){
  viewport.style.transform = `scale(${scale})`;
}
function setScaleFromSlider(value){
  scale = Math.max(0.2, Math.min(3, value / 100));
  applyZoom();
}
function syncSliderToScale(){
  if (!zoomSlider) return;
  zoomSlider.value = Math.round(scale * 100);
}
function fit(){
  const svg = viewport.querySelector('svg');
  if (!svg) return;
  const pad = 40;
  const sx = (canvas.clientWidth - pad) / svg.viewBox.baseVal.width;
  const sy = (canvas.clientHeight - pad) / svg.viewBox.baseVal.height;
  scale = Math.min(sx, sy, 1);
  applyZoom();
  canvas.scrollLeft = Math.max(0, (viewport.getBoundingClientRect().width - canvas.clientWidth)/2);
  canvas.scrollTop = 0;
  syncSliderToScale();
}
function setLanguage(next){
  document.getElementById('langEn').classList.toggle('active', next === 'en');
  document.getElementById('langHi').classList.toggle('active', next === 'hi');
  document.querySelectorAll('.label').forEach(el => {
    el.textContent = next === 'hi' ? el.dataset.hi : el.dataset.en;
  });
}
function edgeDistanceSet(start, depth=3){
  const dist = {[start]:0};
  const q = [start];
  while (q.length){
    const gid = q.shift();
    if (dist[gid] >= depth) continue;
    for (const adj of (GRAPH.adj[gid] || [])){
      if (dist[adj] == null){
        dist[adj] = dist[gid] + 1;
        q.push(adj);
      }
    }
  }
  return dist;
}
function pathD(from, to, positions){
  const a = positions[from];
  const b = positions[to];
  const sx = a.x + GRAPH.node_w/2;
  const sy = a.y + GRAPH.node_h;
  const tx = b.x + GRAPH.node_w/2;
  const ty = b.y;
  const my = (sy + ty)/2;
  return `M ${sx} ${sy} C ${sx} ${my}, ${tx} ${my}, ${tx} ${ty}`;
}
function resetLayout(){
  nodes.forEach(n => {
    n.setAttribute('transform', `translate(${n.dataset.x},${n.dataset.y})`);
  });
  edges.forEach(e => {
    e.setAttribute('d', pathD(e.dataset.from, e.dataset.to, GRAPH.positions));
  });
}
function compactLayout(selected, keep){
  const baseY = GRAPH.positions[selected].y;
  const levels = {0:new Set([selected])};
  const assigned = new Set([selected]);
  let frontier = [selected];
  for (let depth=1; depth<=3; depth++){
    const up = [];
    frontier.forEach(gid => {
      (GRAPH.parents[gid] || []).forEach(p => {
        if (keep.has(p) && !assigned.has(p)){
          assigned.add(p);
          up.push(p);
        }
      });
    });
    if (up.length){
      if (!levels[-depth]) levels[-depth] = new Set();
      up.forEach(x => levels[-depth].add(x));
    }
    const down = [];
    frontier.forEach(gid => {
      (GRAPH.children[gid] || []).forEach(c => {
        if (keep.has(c) && !assigned.has(c)){
          assigned.add(c);
          down.push(c);
        }
      });
    });
    if (down.length){
      if (!levels[depth]) levels[depth] = new Set();
      down.forEach(x => levels[depth].add(x));
    }
    frontier = [...new Set([...up, ...down])];
    if (!frontier.length) break;
  }
  [...keep].forEach(g => {
    if (!assigned.has(g)){
      const delta = GRAPH.positions[g].y - GRAPH.positions[selected].y;
      const rawBand = Math.round(delta / (GRAPH.node_h + GRAPH.v_gap));
      const band = rawBand === 0 ? 1 : rawBand;
      if (!levels[band]) levels[band] = new Set();
      levels[band].add(g);
      assigned.add(g);
    }
  });
  const finalPos = {};
  const genStep = GRAPH.node_h + GRAPH.v_gap;
  const centerX = GRAPH.positions[selected].x + GRAPH.node_w/2;
  const centerY = baseY;
  Object.keys(levels).map(Number).sort((a,b)=>a-b).forEach(band => {
    const row = [...levels[band]];
    row.sort((a,b)=>GRAPH.positions[a].x - GRAPH.positions[b].x);
    const rowW = row.length*(GRAPH.node_w+GRAPH.h_gap) - GRAPH.h_gap;
    const startX = centerX - rowW/2 - GRAPH.node_w/2;
    const y = centerY + band*genStep;
    row.forEach((gid,i) => {
      finalPos[gid] = { x: startX + i*(GRAPH.node_w+GRAPH.h_gap), y };
    });
  });
  return finalPos;
}
function centerKeep(keep, positions){
  const ids = [...keep];
  if (!ids.length) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  ids.forEach(g => {
    const p = positions[g];
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + GRAPH.node_w);
    maxY = Math.max(maxY, p.y + GRAPH.node_h);
  });
  const cx = (minX + maxX)/2 * scale;
  const cy = (minY + maxY)/2 * scale;
  canvas.scrollTo({
    left: Math.max(0, cx - canvas.clientWidth/2),
    top: Math.max(0, cy - canvas.clientHeight/2),
    behavior: 'smooth'
  });
}
function clearFocus(){
  activeGid = null;
  resetLayout();
  nodes.forEach(n => n.classList.remove('active','faded'));
  edges.forEach(e => e.classList.remove('active','faded'));
}
function focusNode(gid){
  if (activeGid === gid){
    clearFocus();
    return;
  }
  activeGid = gid;
  const dist = edgeDistanceSet(gid, 3);
  const keep = new Set(Object.keys(dist));
  const compact = compactLayout(gid, keep);
  const finalPos = { ...GRAPH.positions, ...compact };
  nodes.forEach(n => {
    const show = keep.has(n.dataset.gid);
    const p = finalPos[n.dataset.gid];
    if (p){
      n.setAttribute('transform', `translate(${p.x},${p.y})`);
    }
    n.classList.toggle('active', n.dataset.gid === gid);
    n.classList.toggle('faded', !show);
  });
  edges.forEach(e => {
    const from = e.dataset.from;
    const to = e.dataset.to;
    const fd = dist[from];
    const td = dist[to];
    const visible = fd != null && td != null && Math.abs(fd - td) <= 1;
    const highlighted = visible && (from === gid || to === gid);
    e.setAttribute('d', pathD(from, to, finalPos));
    e.classList.toggle('active', highlighted);
    e.classList.toggle('faded', !visible);
  });
  centerKeep(keep, finalPos);
}
document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));
document.getElementById('langHi').addEventListener('click', () => setLanguage('hi'));
document.getElementById('fitBtn').addEventListener('click', fit);
document.getElementById('zin').addEventListener('click', () => { scale = Math.min(scale*1.15, 3); applyZoom(); syncSliderToScale(); });
document.getElementById('zout').addEventListener('click', () => { scale = Math.max(scale/1.15, 0.2); applyZoom(); syncSliderToScale(); });
document.getElementById('resetZoom').addEventListener('click', () => { scale = 1; applyZoom(); syncSliderToScale(); });
document.getElementById('clearFocus').addEventListener('click', clearFocus);
if (zoomSlider){
  zoomSlider.addEventListener('input', e => {
    const v = Number(e.target.value || 100);
    setScaleFromSlider(v);
  });
}
nodes.forEach(n => {
  n.addEventListener('click', () => focusNode(n.dataset.gid));
  n.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      focusNode(n.dataset.gid);
    }
  });
});
canvas.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  const delta = e.deltaY < 0 ? 1.1 : 1/1.1;
  scale = Math.min(3, Math.max(0.2, scale * delta));
  applyZoom();
  syncSliderToScale();
}, { passive:false });
window.addEventListener('resize', fit);
setLanguage('en');
fit();
</script>
</body>
</html>
